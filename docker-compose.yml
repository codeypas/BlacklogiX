services:
  postgres:
    image: postgres:16-alpine
    container_name: blacklogix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blacklogix
      POSTGRES_USER: blacklogix
      POSTGRES_PASSWORD: blacklogix
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
    container_name: blacklogix-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
